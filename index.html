<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English with Vlad</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F9F5EE;
    --dark: #1A1A2E;
    --gold: #C9A84C;
    --terracotta: #C4622D;
    --text: #2D2D2D;
    --muted: #7A7A7A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    padding: 1.2rem 2.5rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(249,245,238,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    gap: 1rem;
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); }
  .nav-logo .logo-with { font-style: italic; font-size: 0.85em; color: var(--muted); font-weight: 300; letter-spacing: 0.01em; margin: 0 0.05em; }
  .nav-logo .logo-name { color: var(--dark); }
  .nav-right { display: flex; align-items: center; gap: 0.8rem; }

  .lang-toggle { display: flex; border: 1.5px solid rgba(26,26,46,0.2); overflow: hidden; flex-shrink: 0; }
  .lang-btn { background: transparent; border: none; cursor: pointer; padding: 0.45rem 0.85rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); transition: background 0.2s, color 0.2s; }
  .lang-btn.active { background: var(--dark); color: var(--cream); }
  .lang-btn:not(.active):hover { background: rgba(26,26,46,0.06); color: var(--dark); }

  .nav-cta { background: var(--dark); color: var(--cream); border: none; cursor: pointer; padding: 0.6rem 1.4rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; transition: background 0.2s; white-space: nowrap; }
  .nav-cta:hover { background: var(--terracotta); }

  /* HERO */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 80px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 60%); pointer-events: none; }

  .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 5rem 4rem 4rem 6rem; }
  .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); padding: 0.35rem 0.9rem; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--terracotta); margin-bottom: 1.8rem; width: fit-content; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.6rem, 4vw, 3.8rem); line-height: 1.15; color: var(--dark); margin-bottom: 1.3rem; }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero-sub { font-size: 1rem; line-height: 1.75; color: var(--muted); max-width: 420px; margin-bottom: 2.2rem; }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn-primary { background: var(--terracotta); color: white; border: none; cursor: pointer; padding: 0.9rem 2rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; transition: background 0.2s, transform 0.15s; box-shadow: 0 4px 18px rgba(196,98,45,0.22); }
  .btn-primary:hover { background: #b05525; transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--dark); border: 1.5px solid rgba(26,26,46,0.3); cursor: pointer; padding: 0.9rem 2rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--dark); background: var(--dark); color: var(--cream); }

  /* HERO RIGHT — clean info card */
  .hero-right { display: flex; align-items: center; justify-content: center; padding: 4rem 5rem 4rem 2rem; }
  .info-card { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 1px; }
  .info-row { background: white; padding: 1.4rem 1.6rem; border-left: 3px solid transparent; transition: border-color 0.2s; }
  .info-row:hover { border-left-color: var(--gold); }
  .info-row-icon { font-size: 1.2rem; margin-bottom: 0.4rem; }
  .info-row-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); font-weight: 600; margin-bottom: 0.2rem; }
  .info-row-value { font-size: 0.95rem; color: var(--dark); font-weight: 500; }
  .info-row-value small { display: block; font-size: 0.82rem; color: var(--muted); font-weight: 400; margin-top: 0.15rem; }

  /* SECTIONS */
  .section { padding: 5.5rem 6rem; }
  .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--gold); font-weight: 600; margin-bottom: 0.8rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 2.8vw, 2.6rem); color: var(--dark); line-height: 1.2; margin-bottom: 0.9rem; }
  .section-sub { font-size: 1rem; color: var(--muted); max-width: 480px; line-height: 1.7; margin-bottom: 3rem; }

  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: rgba(26,26,46,0.08); }
  .service-card { background: var(--cream); padding: 2.2rem 1.8rem; position: relative; overflow: hidden; transition: background 0.2s; }
  .service-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--gold); transition: width 0.3s; }
  .service-card:hover { background: white; }
  .service-card:hover::after { width: 100%; }
  .service-icon { font-size: 1.8rem; margin-bottom: 1rem; }
  .service-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--dark); margin-bottom: 0.6rem; }
  .service-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.65; }
  .service-tag { display: inline-block; margin-top: 0.9rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--terracotta); font-weight: 600; }

  /* WHY */
  .why-section { padding: 5.5rem 6rem; background: var(--dark); display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .why-section .section-title { color: #fff; }
  .why-section .section-sub { color: rgba(255,255,255,0.55); }
  .why-list { display: flex; flex-direction: column; gap: 1.6rem; }
  .why-item { display: flex; gap: 1.2rem; align-items: flex-start; }
  .why-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); opacity: 0.45; line-height: 1; flex-shrink: 0; width: 2rem; }
  .why-text h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; color: #fff; }
  .why-text p { font-size: 0.86rem; color: rgba(255,255,255,0.5); line-height: 1.6; }

  /* TESTIMONIALS */
  .testimonials-section { padding: 5.5rem 6rem; background: white; }
  .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.8rem; margin-top: 3rem; }
  .testimonial-card { border: 1px solid rgba(26,26,46,0.08); padding: 1.8rem; transition: box-shadow 0.2s, transform 0.2s; }
  .testimonial-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.07); transform: translateY(-2px); }
  .t-stars { color: var(--gold); font-size: 0.82rem; margin-bottom: 0.9rem; }
  .t-quote { font-size: 0.9rem; line-height: 1.7; color: var(--text); margin-bottom: 1.3rem; font-style: italic; }
  .t-author { font-size: 0.8rem; font-weight: 600; color: var(--dark); text-transform: uppercase; letter-spacing: 0.05em; }
  .t-result { font-size: 0.76rem; color: var(--terracotta); margin-top: 0.2rem; font-weight: 500; }

  /* HOW IT WORKS */
  .steps-section { padding: 5.5rem 6rem; }
  .steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 3rem; }
  .step { text-align: center; }
  .step-num { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); opacity: 0.35; line-height: 1; margin-bottom: 0.8rem; }
  .step h4 { font-size: 0.95rem; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; }
  .step p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

  /* CTA */
  .cta-section { padding: 5rem 6rem; background: var(--terracotta); text-align: center; }
  .cta-section .section-label { color: rgba(255,255,255,0.55); }
  .cta-section h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3.5vw, 3rem); color: white; line-height: 1.2; margin-bottom: 0.9rem; }
  .cta-section > p { font-size: 0.98rem; color: rgba(255,255,255,0.72); margin-bottom: 2.2rem; max-width: 440px; margin-left: auto; margin-right: auto; line-height: 1.7; }
  .btn-white { background: white; color: var(--terracotta); border: none; cursor: pointer; padding: 1rem 2.6rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 18px rgba(0,0,0,0.12); }
  .btn-white:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(0,0,0,0.18); }
  .cta-note { margin-top: 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.45); }

  /* FOOTER */
  footer { background: var(--dark); color: rgba(249,245,238,0.45); padding: 2.5rem 6rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--cream); }
  .footer-logo .logo-with { font-style: italic; font-size: 0.85em; color: rgba(249,245,238,0.35); font-weight: 300; margin: 0 0.05em; }
  .footer-logo .logo-name { color: var(--cream); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.7); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); padding: 2.8rem; max-width: 460px; width: 100%; position: relative; animation: slideUp 0.28s ease; }
  @keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-close { position: absolute; top: 1.1rem; right: 1.4rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--dark); margin-bottom: 0.4rem; }
  .modal > p { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.6rem; }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; color: var(--dark); margin-bottom: 0.35rem; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem 0.9rem; border: 1.5px solid rgba(26,26,46,0.14); background: white; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; color: var(--dark); outline: none; transition: border-color 0.2s; appearance: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
  .form-group textarea { resize: vertical; min-height: 75px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
  .modal .btn-primary { width: 100%; margin-top: 0.4rem; }

  /* PRICING */
  .pricing-section { padding: 5.5rem 6rem; background: white; }
  .pricing-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5px; background: rgba(26,26,46,0.08); margin-top: 3rem; }
  .price-card { background: white; padding: 2rem 1.8rem; position: relative; transition: background 0.2s; }
  .price-card:hover { background: var(--cream); }
  .price-card.featured { background: var(--dark); }
  .price-card.featured:hover { background: #22223e; }
  .price-icon { font-size: 1.6rem; margin-bottom: 1rem; }
  .price-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--dark); margin-bottom: 1.2rem; }
  .price-card.featured .price-title { color: var(--cream); }
  .price-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.55rem 0; border-bottom: 1px solid rgba(26,26,46,0.07); }
  .price-card.featured .price-row { border-bottom-color: rgba(255,255,255,0.08); }
  .price-row:last-of-type { border-bottom: none; }
  .price-duration { font-size: 0.82rem; color: var(--muted); }
  .price-card.featured .price-duration { color: rgba(249,245,238,0.5); }
  .price-amount { font-size: 1rem; font-weight: 600; color: var(--dark); white-space: nowrap; }
  .price-card.featured .price-amount { color: var(--gold); }
  .price-note { font-size: 0.75rem; color: var(--muted); margin-top: 1rem; line-height: 1.5; }
  .price-card.featured .price-note { color: rgba(249,245,238,0.4); }
  .popular-tag { display: inline-block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: var(--terracotta); border: 1px solid var(--terracotta); padding: 0.2rem 0.5rem; }

  .lang-fade { transition: opacity 0.18s ease; }
  .lang-fade.fading { opacity: 0; }

  @media (max-width: 960px) {
    .hero { grid-template-columns: 1fr; min-height: auto; }
    .hero-left { padding: 6rem 2rem 2rem; }
    .hero-right { padding: 2rem; justify-content: flex-start; }
    .info-card { max-width: 100%; }
    .section { padding: 4rem 2rem; }
    .why-section { grid-template-columns: 1fr; gap: 2.5rem; padding: 4rem 2rem; }
    .services-grid { grid-template-columns: 1fr; gap: 1px; }
    .testimonials-section { padding: 4rem 2rem; }
    .testimonials-grid { grid-template-columns: 1fr; }
    .steps-section { padding: 4rem 2rem; }
    .steps-grid { grid-template-columns: 1fr 1fr; }
    .pricing-section { padding: 4rem 2rem; }
    .pricing-grid { grid-template-columns: 1fr 1fr; }
    .cta-section { padding: 4rem 2rem; }
    footer { padding: 2rem; flex-direction: column; gap: 1rem; text-align: center; }
    .nav-cta { display: none; }
  }
  @media (max-width: 480px) {
    .steps-grid { grid-template-columns: 1fr; }
    .pricing-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    nav { padding: 1rem 1.2rem; }
  }
</style>

</head>

</nav>

<section class="pricing-section" id="pricing">

  <h2 class="section-title" data-t="price_title"></h2>
  <p class="section-sub" data-t="price_sub"></p>
  <div class="pricing-grid">
    <div class="price-card">
      <div class="price-icon">📚</div>
      <div class="price-title" data-t="p1_title"></div>

let currentLang = 'en';

function setLang(lang) {
  if (lang === currentLang) return;
  const body = document.getElementById('page-body');
  body.classList.add('fading');
  setTimeout(() => {
    currentLang = lang;
    applyTranslations();
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
    document.documentElement.lang = lang;
    body.classList.remove('fading');
  }, 180);
}

function applyTranslations() {
  const t = i18n[currentLang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (!(key in t)) return;
    if (key.endsWith('_html')) el.innerHTML = t[key];
    else el.textContent = t[key];
  });
  document.querySelectorAll('[data-placeholder-t]').forEach(el => {
    const key = el.getAttribute('data-placeholder-t');
    if (key in t) el.placeholder = t[key];
  });
}

applyTranslations();

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
async function handleSubmit(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  try {
    await fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams(data).toString() });
  } catch(err) { /* still show success — Netlify usually catches it */ }
  const t = i18n[currentLang];
  document.getElementById('modal-inner').innerHTML = `
    <div style="text-align:center;padding:2.5rem 0;">
      <div style="font-size:2.5rem;margin-bottom:1rem;">✓</div>
      <h3 style="font-family:'Playfair Display',serif;color:var(--dark);font-size:1.6rem;margin-bottom:0.6rem;">${t.success_h}</h3>
      <p style="color:var(--muted);font-size:0.9rem;line-height:1.65;">${t.success_p}</p>
      <button class="btn-primary" onclick="closeModal()" style="margin-top:1.8rem;width:100%;padding:0.85rem">${t.success_close}</button>
    </div>`;
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
